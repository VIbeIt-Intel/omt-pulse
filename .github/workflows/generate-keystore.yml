name: Generate Keystore (ONE-TIME SETUP — delete after use)
on:
  workflow_dispatch:
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias omt-pulse \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=OMT Pulse, OU=IntelAfri, O=IntelAfriSouthAfrica, L=Johannesburg, S=Gauteng, C=ZA" \
            -storepass omtpulse2024 \
            -keypass omtpulse2024
      - name: Output base64 for GitHub Secret
        run: |
          echo "========== COPY EVERYTHING BETWEEN THE LINES =========="
          echo "--- KEYSTORE_BASE64 ---"
          base64 -w 0 release.keystore
          echo ""
          echo "--- KEYSTORE_PASSWORD ---"
          echo "omtpulse2024"
          echo "--- KEY_ALIAS ---"
          echo "omt-pulse"
          echo "--- KEY_PASSWORD ---"
          echo "omtpulse2024"
          echo "========== END =========="
      - uses: actions/upload-artifact@v4
        with:
          name: release-keystore
          path: release.keystore
