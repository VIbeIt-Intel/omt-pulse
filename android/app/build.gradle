apply plugin: 'com.android.application'

def localProps = new Properties()
def localPropsFile = rootProject.file("local.properties")
if (localPropsFile.exists()) {
    localPropsFile.withInputStream { localProps.load(it) }
}

def googleMapsApiKey = System.getenv("GOOGLE_MAPS_ANDROID_API_KEY")
    ?: localProps.getProperty("GOOGLE_MAPS_ANDROID_API_KEY")
    ?: ""

if (!googleMapsApiKey) {
    def gsFile = file("google-services.json")
    if (gsFile.exists()) {
        try {
            def gs = new groovy.json.JsonSlurper().parse(gsFile)
            def androidClient = gs?.client?.find { it?.client_info?.android_client_info != null }
            def firebaseKey = androidClient?.api_key?.find { it?.current_key }?.current_key
            if (firebaseKey) {
                googleMapsApiKey = firebaseKey.toString()
                logger.lifecycle("Using Firebase Android API key from google-services.json")
            }
        } catch (Exception e) {
            logger.warn("Could not read Android API key from google-services.json: ${e.message}")
        }
    }
}

android {
    namespace "com.intelafri.omtpulse"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.intelafri.omtpulse"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 12
        versionName "1.0.10"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        // Injected at CI build time via GOOGLE_MAPS_ANDROID_API_KEY (see .env.example).
        // Local dev: add GOOGLE_MAPS_ANDROID_API_KEY=... to android/local.properties
        manifestPlaceholders = [
            googleMapsApiKey: googleMapsApiKey
        ]
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            def keystoreFile = file("${projectDir}/release.keystore")
            def storePass = System.getenv("KEYSTORE_PASSWORD") ?: ""
            def keyAliasEnv = System.getenv("KEY_ALIAS") ?: ""
            def keyPass = System.getenv("KEY_PASSWORD") ?: ""
            if (keystoreFile.exists() && storePass && keyAliasEnv && keyPass) {
                storeFile keystoreFile
                storePassword storePass
                keyAlias keyAliasEnv
                keyPassword keyPass
            }
        }
    }
    buildTypes {
        debug {
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (signingConfigs.release.storeFile != null) {
                signingConfig signingConfigs.release
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "androidx.webkit:webkit:$androidxWebkitVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
